[build]
builder = "NIXPACKS"
watchPatterns = [
  "services/search-api/**",
  "packages/**",
  "pnpm-lock.yaml",
  "package.json",
  "turbo.json"
]

[deploy]
startCommand = "pnpm --filter @retailer-search/search-api start"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
