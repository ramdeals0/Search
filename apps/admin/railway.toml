[build]
builder = "NIXPACKS"
buildCommand = "pnpm install --frozen-lockfile && pnpm --filter @retailer-search/admin... build"
watchPatterns = [
  "apps/admin/**",
  "packages/**",
  "pnpm-lock.yaml",
  "package.json"
]

[deploy]
startCommand = "pnpm --filter @retailer-search/admin start"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
