[build]
builder = "NIXPACKS"
buildCommand = "pnpm install --frozen-lockfile && pnpm --filter @retailer-search/storefront... build"
watchPatterns = [
  "apps/storefront/**",
  "packages/**",
  "pnpm-lock.yaml",
  "package.json"
]

[deploy]
startCommand = "pnpm --filter @retailer-search/storefront start"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
